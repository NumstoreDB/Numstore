name: CI (develop)
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  tests:
    name: ci-tests / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # Build the code
      - run: cmake --preset ci-tests
      - run: cmake --build --preset ci-tests

      # Run the tests
      - shell: bash
        run: |
          exe=$(find build/ci-tests/bin -maxdepth 2 -name 'unit_tests*' -type f | head -1)
          "$exe"

      - shell: bash
        run: |
          exe=$(find build/ci-tests/bin -maxdepth 2 -name 'irwr_swarm_test*' -type f | head -1)
          "$exe" 10 $RANDOM

      - shell: bash
        run: |
          exe=$(find build/ci-tests/bin -maxdepth 2 -name 'cgd_swarm_test*' -type f | head -1)
          "$exe" 10 $RANDOM

  release-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      # Build the code
      - run: cmake --preset ci-release-tests
      - run: cmake --build --preset ci-release-tests

      # Run the tests
      - shell: bash
        run: |
          exe=$(find build/ci-release-tests/bin -maxdepth 2 -name 'unit_tests*' -type f | head -1)
          "$exe"

      - shell: bash
        run: |
          exe=$(find build/ci-release-tests/bin -maxdepth 2 -name 'irwr_swarm_test*' -type f | head -1)
          "$exe" 10 $RANDOM

      - shell: bash
        run: |
          exe=$(find build/ci-release-tests/bin -maxdepth 2 -name 'cgd_swarm_test*' -type f | head -1)
          "$exe" 10 $RANDOM

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: sudo apt-get install -y lcov

      # Build the code
      - run: cmake --preset ci-coverage
      - run: cmake --build --preset ci-coverage

      # Run the tests
      - run: ./build/ci-coverage/bin/unit_tests
      - run: ./build/ci-coverage/bin/irwr_swarm_test 10 $RANDOM
      - run: ./build/ci-coverage/bin/cgd_swarm_test 10 $RANDOM

      # Generate and upload coverage
      - run: |
          lcov --capture --directory build/ci-coverage --output-file coverage.info --ignore-errors mismatch
      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.info
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
