name: CI
on:
  push:
  pull_request:
jobs:
  build:
    name: ${{ matrix.preset }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      TEST_DIR: ./build/${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # For each:
          #   1. Compile and run debug tests with address sanitizer 
          #   2. Compile and run debug tests with leak check
          #   2. Just make sure release can compile (without tests)
          #   3. (ubtuntu only) Compile release with tests to ensure no ASSERT tests pass
          #   4. Ensure package release can compile
          
          - { os: ubuntu-latest,  preset: debug-asan,       run_tests: true }
          - { os: ubuntu-latest,  preset: debug-leakcheck,  run_tests: true }
          - { os: ubuntu-latest,  preset: release }
          - { os: ubuntu-latest,  preset: release-asan,     run_tests: true }
          - { os: ubuntu-latest,  preset: package-release }

          - { os: macos-latest,   preset: debug-asan,       run_tests: true }
          - { os: macos-latest,   preset: debug-leakcheck,  run_tests: true }
          - { os: macos-latest,   preset: release }
          - { os: macos-latest,   preset: package-release }

          - { os: windows-latest, preset: debug-asan,       run_tests: true }
          - { os: windows-latest, preset: release }
          - { os: windows-latest, preset: package-release }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install numpy

      - name: Install Valgrind
        if: matrix.os == 'ubuntu-latest' && contains(matrix.preset, 'leakcheck')
        run: sudo apt-get install -y valgrind

      - name: Check leaks available
        if: matrix.os == 'macos-latest' && contains(matrix.preset, 'leakcheck')
        run: leaks --version

      - name: Configure (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DPython_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}"

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $pypath = "${{ steps.setup-python.outputs.python-path }}" -replace '\\', '/'
          cmake --preset ${{ matrix.preset }} `
            -DPython_EXECUTABLE="$pypath"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: matrix.run_tests && !contains(matrix.preset, 'leakcheck')
        run: ctest --test-dir ${{ env.TEST_DIR }} -V

      - name: Test (memcheck)
        if: matrix.run_tests && contains(matrix.preset, 'leakcheck')
        run: ctest --test-dir ${{ env.TEST_DIR }} -V -T memcheck
