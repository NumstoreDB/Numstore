name: CI
on:
  push:
  pull_request:
jobs:
  build:
    name: ${{ matrix.preset }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      TEST_DIR: ./build/${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # For each:
          #   1. Compile and run debug tests with address sanitizer
          #   2. Compile and run debug tests with leak check
          #   3. Just make sure release can compile (without tests)
          #   4. (ubuntu only) Compile release with tests to ensure no ASSERT tests pass
          #   5. Ensure package release can compile

          - { os: ubuntu-latest,  preset: debug-asan,      run_tests: true,  config: Debug   }
          - { os: ubuntu-latest,  preset: debug-leakcheck, run_tests: true,  config: Debug   }
          - { os: ubuntu-latest,  preset: release,                            config: Release }
          - { os: ubuntu-latest,  preset: release-asan,    run_tests: true,  config: Release }
          - { os: ubuntu-latest,  preset: package-release,                   config: Release }

          - { os: macos-latest,   preset: debug-asan,       run_tests: true,  config: Debug   }
          - { os: macos-latest,   preset: release,                             config: Release }
          - { os: macos-latest, preset: package-release,                    config: Release }

          - { os: windows-latest, preset: release-tests,    run_tests: true,  config: Release }
          - { os: windows-latest, preset: debug-asan,       run_tests: true,  config: Debug }
          - { os: windows-latest, preset: package-release,                    config: Release }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install numpy

      - name: Install Valgrind
        if: contains(matrix.preset, 'leakcheck') && matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y valgrind

      - name: Configure (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DPython_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}"

      - name: Configure (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $pypath = "${{ steps.setup-python.outputs.python-path }}" -replace '\\', '/'
          cmake --preset ${{ matrix.preset }} `
            -DPython_EXECUTABLE="$pypath"

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: matrix.run_tests && !contains(matrix.preset, 'leakcheck')
        run: ctest --test-dir ${{ env.TEST_DIR }} -V -C ${{ matrix.config || 'Debug' }}

      - name: Test (memcheck)
        if: matrix.run_tests && contains(matrix.preset, 'leakcheck') && matrix.os != 'macos-latest'
        run: ctest --test-dir ${{ env.TEST_DIR }} -V -T memcheck -C ${{ matrix.config || 'Debug' }}

      - name: Test (leaks)
        if: matrix.run_tests && contains(matrix.preset, 'leakcheck') && matrix.os == 'macos-latest'
        run: leaks --atExit -- ./build/${{ matrix.preset }}/bin/unit_test

      - name: Print memcheck log
        if: failure() && contains(matrix.preset, 'leakcheck')
        run: cat ./build/${{ matrix.preset }}/Testing/Temporary/MemoryChecker.1.log
