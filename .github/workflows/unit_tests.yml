name: CI
on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.preset }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # Single-config generators (Ninja/Make on Linux & macOS):
      #   build/<preset>/bin/unit_tests
      # Multi-config generators (Visual Studio on Windows):
      #   build/<preset>/bin/<Config>/unit_tests.exe
      # Both cases are handled by the "Set test binary path" step below,
      # which writes UNIT_TESTS into $GITHUB_ENV.
      BUILD_DIR: ./build/${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Compile and run debug tests with address sanitizer
          - { os: ubuntu-latest,    preset: debug, run_tests: true,  config: Debug }
          - { os: macos-latest,     preset: debug, run_tests: true,  config: Debug }
          - { os: windows-latest,   preset: debug, run_tests: true,  config: Debug }
          - { os: ubuntu-24.04-arm, preset: debug, run_tests: true,  config: Debug }
          - { os: ubuntu-22.04,     preset: debug, run_tests: true,  config: Debug }
          - { os: macos-15,         preset: debug, run_tests: true,  config: Debug }
          - { os: macos-15-intel,   preset: debug, run_tests: true,  config: Debug }
          - { os: windows-11-arm,   preset: debug, run_tests: true,  config: Debug }
          - { os: windows-2022,     preset: debug, run_tests: true,  config: Debug }

          # Compile this one for valgrind run
          - { os: ubuntu-latest,    preset: debug-no-asan, run_tests: true,  config: Debug }

          # Compile release and run tests (tests don't fail in release mode)
          - { os: ubuntu-latest,  preset: release-tests-asan, run_tests: true,  config: Release }
          - { os: macos-latest,   preset: release-tests-asan, run_tests: true,  config: Release }
          - { os: windows-latest, preset: release-tests-asan, run_tests: true,  config: Release }

          # Package release for all architectures
          - { os: ubuntu-latest,    preset: package-release, config: Release, generators: "TGZ;ZIP;DEB;RPM" }
          - { os: macos-latest,     preset: package-release, config: Release, generators: "TGZ;ZIP"         }
          - { os: windows-latest,   preset: package-release, config: Release, generators: "ZIP"             }
          - { os: ubuntu-24.04-arm, preset: package-release, config: Release, generators: "TGZ;ZIP;DEB;RPM" }
          - { os: ubuntu-22.04,     preset: package-release, config: Release, generators: "TGZ;ZIP;DEB;RPM" }
          - { os: macos-15,         preset: package-release, config: Release, generators: "TGZ;ZIP"         }
          - { os: macos-15-intel,   preset: package-release, config: Release, generators: "TGZ;ZIP"         }
          - { os: windows-11-arm,   preset: package-release, config: Release, generators: "ZIP"             }
          - { os: windows-2022,     preset: package-release, config: Release, generators: "ZIP"             }

    steps:

        ########################################################
        ######## Base Images for build step

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

        ########################################################
        ######## Install Dependencies

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install numpy

        ########################################################
        ######## CMake Configure Step

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DPython_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}"

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pypath = "${{ steps.setup-python.outputs.python-path }}" -replace '\\', '/'
          cmake --preset ${{ matrix.preset }} `
            -DPython_EXECUTABLE="$pypath"

        ########################################################
        ######## CMake Build Step

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

        ########################################################
        ######## Tests

        # Resolve the binary path once, accounting for MSVC's config subfolder.
      - name: Set test binary path
        if: matrix.run_tests
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "UNIT_TESTS=${{ env.BUILD_DIR }}/bin/${{ matrix.config }}/unit_tests.exe" >> "$GITHUB_ENV"
          else
            echo "UNIT_TESTS=${{ env.BUILD_DIR }}/bin/unit_tests" >> "$GITHUB_ENV"
          fi

        # Normal test - just run the tests
      - name: Test
        if: matrix.run_tests
        run: ${{ env.UNIT_TESTS }}

        ########################################################
        ######## CMake Package Step

      - name: Package with CPack
        if: matrix.generators != ''
        shell: bash
        run: |
          cd build/package-release
          cpack -C Release -G "${{ matrix.generators }}"

        ########################################################
        ######## Upload artifacts

      - name: Prepare Artifacts
        if: matrix.generators != ''
        shell: bash
        run: |
          mkdir -p dist
          mv build/package-release/*.tar.gz   dist/ 2>/dev/null || true
          mv build/package-release/*.deb      dist/ 2>/dev/null || true
          mv build/package-release/*.rpm      dist/ 2>/dev/null || true
          mv build/package-release/*.zip      dist/ 2>/dev/null || true
          cp LICENSE.md dist/

      - name: Upload Artifacts
        if: matrix.generators != ''
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}-${{ matrix.preset }}
          path: dist/*


  ########################################################
  ######## Generate Code Coverage

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      TEST_DIR: ./build/debug-coverage
    steps:

        ########################################################
        ######## Base Images

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

        ########################################################
        ######## Dependencies

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install numpy

      - name: Install lcov
        run: sudo apt-get install -y lcov

        ########################################################
        ######## CMake Configure + Build

      - name: Configure
        run: |
          cmake --preset debug-coverage \
            -DPython_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}"

      - name: Build
        run: cmake --build --preset debug-coverage

        ########################################################
        ######## Run unit tests
        # Running the instrumented binary is all that's needed to
        # populate .gcda files — no ctest -T coverage required.

      - name: Test
        run: ${{ env.TEST_DIR }}/bin/unit_tests

        ########################################################
        ######## Coverage
        # lcov captures directly from the .gcda/.gcno files that
        # the test run above produced.

      - name: Coverage
        run: |
          lcov --capture \
               --directory ${{ env.TEST_DIR }} \
               --base-directory . \
               --output-file coverage.info \
               --ignore-errors mismatch
          lcov --remove coverage.info \
               '*/test*' \
               '*/Python*' \
               '*/numpy*' \
               '*/hostedtoolcache/*' \
               --output-file coverage.info \
               --ignore-errors mismatch,unused
          genhtml coverage.info --output-directory coverage_html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage_html/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          token: ${{ secrets.CODECOV_TOKEN }}


  ########################################################
  ######## Valgrind (ubuntu-latest, plain debug — no ASan)
  # ASan and Valgrind intercept malloc at the same level and
  # are mutually exclusive.  Use a plain debug preset here.

  valgrind:
    name: Valgrind / ubuntu-latest
    runs-on: ubuntu-latest
    env:
      TEST_DIR: ./build/debug-no-asan
    steps:

        ########################################################
        ######## Base Images

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

        ########################################################
        ######## Dependencies

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install numpy

      - name: Install Valgrind
        run: sudo apt-get install -y valgrind

        ########################################################
        ######## CMake Configure + Build

      - name: Configure
        run: |
          cmake --preset debug-valgrind \
            -DPython_EXECUTABLE="${{ steps.setup-python.outputs.python-path }}"

      - name: Build
        run: cmake --build --preset debug-no-asan

        ########################################################
        ######## Run under Valgrind
        # .valgrindrc in the repo root is picked up automatically.

      - name: Valgrind
        run: |
          valgrind \
            --error-exitcode=1 \
            --xml=yes \
            --xml-file=valgrind-report.xml \
            ${{ env.TEST_DIR }}/bin/unit_tests

      - name: Upload Valgrind report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-report
          path: valgrind-report.xml


  ########################################################
  ######## Publish GitHub Release (tag only)

  publish:
    name: Publish GitHub Release
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
