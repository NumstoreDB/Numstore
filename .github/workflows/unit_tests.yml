name: CI
on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  tests:
    name: ${{ matrix.preset }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    preset: ci-tests }
          - { os: macos-latest,     preset: ci-tests }
          - { os: windows-latest,   preset: ci-tests }
          - { os: ubuntu-latest,    preset: ci-release-tests }
          - { os: ubuntu-22.04,     preset: ci-release-tests }
          - { os: ubuntu-24.04-arm, preset: ci-release-tests }
          - { os: macos-latest,     preset: ci-release-tests }
          - { os: macos-15-intel,   preset: ci-release-tests }
          - { os: windows-latest,   preset: ci-release-tests }
          - { os: windows-11-arm,   preset: ci-release-tests }

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # CMake Stuff
      - run: cmake --preset ${{ matrix.preset }}
      - run: cmake --build --preset ${{ matrix.preset }}

      # Run the unit tests
      - shell: bash
        run: |
          exe=$(find build/${{ matrix.preset }}/bin -maxdepth 2 -name 'unit_tests*' -type f | head -1)
          "$exe" 

      # Run irwr tests
      - shell: bash
        run: |
          exe=$(find build/${{ matrix.preset }}/bin -maxdepth 2 -name 'irwr_swarm_test*' -type f | head -1)
          "$exe" 10 $RANDOM

      # Run cgd tests
      - shell: bash
        run: |
          exe=$(find build/${{ matrix.preset }}/bin -maxdepth 2 -name 'cgd_swarm_test*' -type f | head -1)
          "$exe" 10 $RANDOM

  package:
    name: package / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - run: cmake --preset package
      - run: cmake --build --preset package
      - run: cd build/package && cpack
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: |
            build/package/*.tar.gz
            build/package/*.zip
            build/package/*.deb
            build/package/*.rpm

  valgrind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: sudo apt-get install -y valgrind
      - run: cmake --preset ci-valgrind
      - run: cmake --build --preset ci-valgrind
      - run: valgrind --error-exitcode=1 ./build/ci-valgrind/bin/all_tests 10 $RANDOM

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - run: sudo apt-get install -y lcov
      - run: cmake --preset ci-coverage
      - run: cmake --build --preset ci-coverage
      - run: ./build/ci-coverage/bin/unit_tests 
      - run: ./build/ci-coverage/bin/irwr_swarm_test 10 $RANDOM
      - run: ./build/ci-coverage/bin/cgd_swarm_test 10 $RANDOM
      - run: |
          lcov --capture --directory build/ci-coverage --output-file coverage.info --ignore-errors mismatch
          genhtml coverage.info --output-directory coverage_html
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage_html/

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
